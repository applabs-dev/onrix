# Onrix 镜像构建 → GitHub Container Registry (ghcr.io/applabs-dev/onrix)
# 手动触发(workflow_dispatch),避免误触发仓库内继承的 tag 工作流。
# 公开仓 → Actions 免费无限量;用内置 GITHUB_TOKEN 推 GHCR(同账户,无需额外密钥)。
name: Build & Push Onrix (GHCR)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "镜像标签(默认 latest 之外再打一个)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    # 原生 arm64 runner(公开仓免费)→ 只构建 arm64、不走 QEMU 模拟,快很多。
    # 部署目标只有树莓派(arm64),不需要 amd64。
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/applabs-dev/onrix
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event.inputs.tag != '' }}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
